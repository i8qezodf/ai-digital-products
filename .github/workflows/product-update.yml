name: Product Update Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 3 AM UTC

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: List products
        run: |
          echo "## Product Inventory" >> $GITHUB_STEP_SUMMARY
          find . -name "*.md" -type f | head -20 >> $GITHUB_STEP_SUMMARY
